name: Monthly Supabase Backup

on:
  schedule:
    # Ngày 1 mỗi tháng, 19:00 UTC = 02:00 sáng giờ Việt Nam
    - cron: '0 19 1 * *'
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client 17
        # Supabase runs Postgres 17 - pg_dump refuses to dump from a server
        # newer than itself, and Ubuntu's default apt package is v16, so the
        # matching client has to come from the official PostgreSQL apt repo.
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: pg_dump "$DATABASE_URL" -F c -f backup-$(date +%F).dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backup-*.dump
          retention-days: 90
